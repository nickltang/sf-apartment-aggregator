name: Repo Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required project files exist
        run: |
          test -f README.md
          test -f docs/spec.md
          test -f .env.example
