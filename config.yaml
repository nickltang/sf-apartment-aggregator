poll_interval_minutes: 10
db_path: data/aggregator.db
sources:
  - name: craigslist_sf
    type: rss
    url: https://sfbay.craigslist.org/search/sfc/apa?format=rss
    timeout_seconds: 10
    retries: 1
  - name: greystar
    type: html
    url: https://www.greystar.com/apartments/san-francisco-ca
    timeout_seconds: 10
    retries: 1
    listing_selector: .listing
    title_selector: .title
    url_selector: a
    price_selector: .price
    beds_selector: .beds
    location_selector: .location
    summary_selector: .summary
  - name: rentsfnow
    type: html
    url: https://www.rentsfnow.com/apartments/san-francisco
    timeout_seconds: 10
    retries: 1
    listing_selector: .listing
    title_selector: .title
    url_selector: a
    price_selector: .price
    beds_selector: .beds
    location_selector: .location
    summary_selector: .summary
  - name: gaetani
    type: html
    url: https://www.gaetanirealestate.com/rentals
    timeout_seconds: 10
    retries: 1
    listing_selector: .listing
    title_selector: .title
    url_selector: a
    price_selector: .price
    beds_selector: .beds
    location_selector: .location
    summary_selector: .summary
  - name: jwavro
    type: html
    url: https://jwavro.com/rentals
    timeout_seconds: 10
    retries: 1
    listing_selector: .listing
    title_selector: .title
    url_selector: a
    price_selector: .price
    beds_selector: .beds
    location_selector: .location
    summary_selector: .summary
filters:
  max_price: 4500
  min_beds: 1
  max_beds: 3
  neighborhoods: ["Mission", "Noe Valley", "Inner Sunset"]
  aliases:
    Mission: ["The Mission", "Mission District"]
    "Noe Valley": ["Noe"]
    "Inner Sunset": ["Sunset"]
  include_keywords: ["laundry", "parking"]
  exclude_keywords: ["senior housing", "income restricted"]
discord:
  webhook_url:
dashboard:
  host: 127.0.0.1
  port: 8000
logging:
  level: INFO
